<form class="rnk-form" autocomplete="off" data-theme="{{#if data.defaults.dungeon_theme}}{{data.defaults.dungeon_theme}}{{else}}classic_dungeon{{/if}}">
  <!-- Header -->
  <div class="rnk-header">
    <div class="rnk-header__title">
      <h1><i class="fas fa-dice-d20"></i> RNK CORE MAPGEN</h1>
      <span class="rnk-status" data-status="{{data.serverStatus}}"><i class="fas fa-circle"></i> {{data.serverStatus}}</span>
      <span class="rnk-status" data-patreon-auth-chip data-state="locked" style="margin-left:8px;"><i class="fab fa-patreon"></i> Patreon: locked</span>
    </div>
    <div class="rnk-header__actions">
      <button type="button" class="rnk-btn-icon" data-action="patreon-login" title="Connect Patreon"><i class="fab fa-patreon"></i></button>
      <button type="button" class="rnk-btn-icon" data-action="patreon-logout" title="Disconnect Patreon"><i class="fas fa-right-from-bracket"></i></button>
      <button type="button" class="rnk-btn-icon" data-action="test-connection" title="Test Connection"><i class="fas fa-sync-alt"></i></button>
      <button type="button" class="rnk-btn-icon" data-action="open-tracker" title="Open Scene Tracker"><i class="fas fa-satellite-dish"></i></button>
    </div>
  </div>

  <div class="rnk-workspace">
    <div class="rnk-controls">

      <!-- DUNGEON THEME -->
      <div class="rnk-section">
        <div class="rnk-section__header"><i class="fas fa-scroll"></i> DUNGEON THEME</div>
        <div class="rnk-row">
          <div class="rnk-field compact">
            <label>Theme</label>
            <select name="dungeon_theme" class="rnk-select" title="Dungeon theme">
              <option value="classic_dungeon" {{#if (eq data.defaults.dungeon_theme "classic_dungeon")}}selected{{/if}}>Classic Dungeon</option>
              <option value="natural_cave" {{#if (eq data.defaults.dungeon_theme "natural_cave")}}selected{{/if}}>Natural Cave</option>
              <option value="crypt" {{#if (eq data.defaults.dungeon_theme "crypt")}}selected{{/if}}>Crypt</option>
              <option value="sewer" {{#if (eq data.defaults.dungeon_theme "sewer")}}selected{{/if}}>Sewer</option>
              <option value="forest" {{#if (eq data.defaults.dungeon_theme "forest")}}selected{{/if}}>Forest</option>
              <option value="frozen" {{#if (eq data.defaults.dungeon_theme "frozen")}}selected{{/if}}>Frozen Tundra</option>
              <option value="lava" {{#if (eq data.defaults.dungeon_theme "lava")}}selected{{/if}}>Lava Flows</option>
              <option value="infernal" {{#if (eq data.defaults.dungeon_theme "infernal")}}selected{{/if}}>Infernal</option>
              <option value="abandoned_mine" {{#if (eq data.defaults.dungeon_theme "abandoned_mine")}}selected{{/if}}>Abandoned Mine</option>
              <option value="clockwork" {{#if (eq data.defaults.dungeon_theme "clockwork")}}selected{{/if}}>Clockwork</option>
              <option value="crystal_cavern" {{#if (eq data.defaults.dungeon_theme "crystal_cavern")}}selected{{/if}}>Crystal Cavern</option>
              <option value="fungal_underdark" {{#if (eq data.defaults.dungeon_theme "fungal_underdark")}}selected{{/if}}>Fungal Underdark</option>
            </select>
          </div>
        </div>
      </div>

      <!-- DIMENSIONS -->
      <div class="rnk-section">
        <div class="rnk-section__header thin"><i class="fas fa-vector-square"></i> DIMENSIONS & GRID</div>
        <div class="rnk-row">
          <div class="rnk-field compact">
            <label>Width <span class="range-value">{{data.defaults.width}}</span></label>
            <input type="range" name="width" value="{{data.defaults.width}}" min="20" max="200" class="rnk-input" title="Width">
          </div>
          <div class="rnk-field compact">
            <label>Height <span class="range-value">{{data.defaults.height}}</span></label>
            <input type="range" name="height" value="{{data.defaults.height}}" min="20" max="200" class="rnk-input" title="Height">
          </div>
          <div class="rnk-field compact">
            <label>Grid Size <span class="range-value">{{data.sceneOptions.gridSize}}</span></label>
            <input type="range" name="grid_size" value="{{data.sceneOptions.gridSize}}" min="50" max="200" class="rnk-input" title="Grid Size">
          </div>
          <div class="rnk-field compact">
            <label>Seed</label>
            <input type="text" name="seed" value="{{data.defaults.seed}}" placeholder="Random" class="rnk-input">
          </div>
        </div>
        <div class="rnk-row">
          <div class="rnk-field compact">
            <label>Tile Size</label>
            <select name="tile_size" class="rnk-select" title="Tile size">
              <option value="8">8px</option>
              <option value="12" selected>12px</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Grid Type</label>
            <select name="grid_type" class="rnk-select" title="Grid type">
              <option value="square" {{#if (eq data.defaults.grid_type "square")}}selected{{/if}}>Square</option>
              <option value="hex" {{#if (eq data.defaults.grid_type "hex")}}selected{{/if}}>Hex</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Scene Name</label>
            <input type="text" name="scene_name" value="{{data.defaults.scene_name}}" placeholder="Auto" class="rnk-input">
          </div>
        </div>
      </div>

      <!-- ARCHITECTURE -->
      <div class="rnk-section">
        <div class="rnk-section__header thin"><i class="fas fa-door-open"></i> ARCHITECTURE</div>
        <div class="rnk-row">
          <div class="rnk-field compact">
            <label>Rooms <span class="range-value">{{data.defaults.room_count}}</span></label>
            <input type="range" name="room_count" value="{{data.defaults.room_count}}" min="1" max="50" class="rnk-input" title="Room count">
          </div>
          <div class="rnk-field compact">
            <label>Levels <span class="range-value">{{data.defaults.total_levels}}</span></label>
            <input type="range" name="total_levels" value="{{data.defaults.total_levels}}" min="1" max="20" class="rnk-input" title="Total levels">
          </div>
          <div class="rnk-field compact">
            <label>Room Size</label>
            <select name="room_size" class="rnk-select" title="Room size">
              <option value="tiny" {{#if (eq data.defaults.room_size "tiny")}}selected{{/if}}>Tiny</option>
              <option value="small" {{#if (eq data.defaults.room_size "small")}}selected{{/if}}>Small</option>
              <option value="medium" {{#if (eq data.defaults.room_size "medium")}}selected{{/if}}>Medium</option>
              <option value="large" {{#if (eq data.defaults.room_size "large")}}selected{{/if}}>Large</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Corridor <span class="range-value">{{data.defaults.corridor_complexity}}</span></label>
            <input type="range" name="corridor_complexity" value="{{data.defaults.corridor_complexity}}" min="1" max="10" class="rnk-input" title="Corridor complexity">
          </div>
        </div>
        <div class="rnk-row">
          <div class="rnk-field compact">
            <label>Symmetry</label>
            <select name="symmetry_preference" class="rnk-select" title="Symmetry preference">
              <option value="asymmetric" selected>Asymmetric</option>
              <option value="balanced">Balanced</option>
              <option value="symmetric">Symmetric</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Verticality</label>
            <select name="verticality_preference" class="rnk-select" title="Verticality preference">
              <option value="flat" selected>Flat</option>
              <option value="moderate">Moderate</option>
              <option value="multilevel">Multilevel</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Density</label>
            <select name="connection_density" class="rnk-select" title="Connection density">
              <option value="isolated">Isolated</option>
              <option value="moderate" selected>Moderate</option>
              <option value="interconnected">Connected</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Shape</label>
            <select name="chamber_shape" class="rnk-select" title="Chamber shape">
              <option value="square" selected>Square</option>
              <option value="circular">Circular</option>
              <option value="irregular">Irregular</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Pacing</label>
            <select name="encounter_pacing" class="rnk-select" title="Encounter pacing">
              <option value="spread" selected>Spread</option>
              <option value="clustered">Clustered</option>
            </select>
          </div>
        </div>
        <div class="rnk-row">
          <div class="rnk-field compact">
            <label>Branching <span class="range-value">{{data.defaults.branch_factor}}</span></label>
            <input type="range" name="branch_factor" value="{{data.defaults.branch_factor}}" min="0" max="10" class="rnk-input" title="Branch factor">
          </div>
          <div class="rnk-field compact">
            <label>Dead Ends <span class="range-value">{{data.defaults.dead_end_frequency}}</span></label>
            <input type="range" name="dead_end_frequency" value="{{data.defaults.dead_end_frequency}}" min="0" max="10" class="rnk-input" title="Dead end frequency">
          </div>
          <div class="rnk-field compact">
            <label>Loot Dens. <span class="range-value">{{data.defaults.treasure_density}}</span></label>
            <input type="range" name="treasure_density" value="{{data.defaults.treasure_density}}" min="0" max="10" class="rnk-input" title="Treasure density">
          </div>
          <div class="rnk-field compact">
            <label>Secret Rm. <span class="range-value">{{data.defaults.secret_room_frequency}}</span></label>
            <input type="range" name="secret_room_frequency" value="{{data.defaults.secret_room_frequency}}" min="0" max="10" class="rnk-input" title="Secret room frequency">
          </div>
          <div class="rnk-field compact">
            <label>Variety <span class="range-value">{{data.defaults.room_variety}}</span></label>
            <input type="range" name="room_variety" value="{{data.defaults.room_variety}}" min="1" max="10" class="rnk-input" title="Room variety">
          </div>
        </div>
      </div>

      <!-- TRAPS & HAZARDS -->
      <div class="rnk-section">
        <div class="rnk-section__header thin"><i class="fas fa-skull"></i> TRAPS & HAZARDS</div>
        <div class="rnk-row">
          <div class="rnk-field compact">
            <label>Count <span class="range-value">{{data.defaults.trap_count}}</span></label>
            <input type="range" name="trap_count" value="{{data.defaults.trap_count}}" min="0" max="100" class="rnk-input" title="Trap count">
          </div>
          <div class="rnk-field compact">
            <label>DC <span class="range-value">{{data.defaults.trap_difficulty}}</span></label>
            <input type="range" name="trap_difficulty" value="{{data.defaults.trap_difficulty}}" min="5" max="30" class="rnk-input" title="Trap difficulty">
          </div>
          <div class="rnk-field compact">
            <label>Radius <span class="range-value">{{data.defaults.trap_radius}}</span></label>
            <input type="range" name="trap_radius" value="{{data.defaults.trap_radius}}" min="1" max="30" class="rnk-input" title="Trap radius">
          </div>
          <div class="rnk-field compact">
            <label>Trap Type</label>
            <select name="trap_type" class="rnk-select" title="Trap type">
              <option value="none" {{#if (eq data.defaults.trap_type "none")}}selected{{/if}}>None (Disabled)</option>
              <option value="spike" {{#if (eq data.defaults.trap_type "spike")}}selected{{/if}}>Spike Floor</option>
              <option value="flame" {{#if (eq data.defaults.trap_type "flame")}}selected{{/if}}>Flame Jet</option>
              <option value="pit" {{#if (eq data.defaults.trap_type "pit")}}selected{{/if}}>Pit Trap</option>
              <option value="dart" {{#if (eq data.defaults.trap_type "dart")}}selected{{/if}}>Dart Shooter</option>
              <option value="acid" {{#if (eq data.defaults.trap_type "acid")}}selected{{/if}}>Acid Spray</option>
              <option value="scythe" {{#if (eq data.defaults.trap_type "scythe")}}selected{{/if}}>Scythe Blade</option>
              <option value="web" {{#if (eq data.defaults.trap_type "web")}}selected{{/if}}>Web Snare</option>
              <option value="alarm" {{#if (eq data.defaults.trap_type "alarm")}}selected{{/if}}>Alarm Bell</option>
              <option value="random" {{#if (eq data.defaults.trap_type "random")}}selected{{/if}}>Random</option>
            </select>
          </div>
        </div>
      </div>

      <!-- ENVIRONMENT -->
      <div class="rnk-section">
        <div class="rnk-section__header thin"><i class="fas fa-palette"></i> ENVIRONMENT</div>
        <div class="rnk-row">
          <div class="rnk-field compact">
            <label>Darkness <span class="range-value">{{data.sceneOptions.darkness}}</span></label>
            <input type="range" name="darkness" value="{{data.sceneOptions.darkness}}" min="0" max="1" step="0.1" class="rnk-input" title="Darkness level">
          </div>
          <div class="rnk-field compact">
            <label>Light Color</label>
            <input type="color" name="light_color" value="{{data.defaults.light_color}}" class="rnk-input" title="Light color">
          </div>
          <div class="rnk-field compact">
            <label>Intensity <span class="range-value">{{data.defaults.light_intensity}}</span></label>
            <input type="range" name="light_intensity" value="{{data.defaults.light_intensity}}" min="0" max="1" step="0.05" class="rnk-input" title="Light intensity">
          </div>
        </div>
        <div class="rnk-row">
          <div class="rnk-field compact">
            <label>Light Animation</label>
            <select name="light_animation" class="rnk-select" title="Light animation">
              <option value="torch" {{#if (eq data.defaults.light_animation "torch")}}selected{{/if}}>Torch</option>
              <option value="flicker" {{#if (eq data.defaults.light_animation "flicker")}}selected{{/if}}>Flicker</option>
              <option value="pulse" {{#if (eq data.defaults.light_animation "pulse")}}selected{{/if}}>Pulse</option>
              <option value="chroma" {{#if (eq data.defaults.light_animation "chroma")}}selected{{/if}}>Chroma</option>
              <option value="wave" {{#if (eq data.defaults.light_animation "wave")}}selected{{/if}}>Wave</option>
              <option value="fog" {{#if (eq data.defaults.light_animation "fog")}}selected{{/if}}>Fog</option>
              <option value="sunburst" {{#if (eq data.defaults.light_animation "sunburst")}}selected{{/if}}>Sunburst</option>
              <option value="dome" {{#if (eq data.defaults.light_animation "dome")}}selected{{/if}}>Dome</option>
              <option value="emanation" {{#if (eq data.defaults.light_animation "emanation")}}selected{{/if}}>Emanation</option>
              <option value="hexa" {{#if (eq data.defaults.light_animation "hexa")}}selected{{/if}}>Hexa</option>
              <option value="ghost" {{#if (eq data.defaults.light_animation "ghost")}}selected{{/if}}>Ghost</option>
              <option value="none" {{#if (eq data.defaults.light_animation "none")}}selected{{/if}}>None</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Ambient Sound</label>
            <select name="sound_ambient" class="rnk-select" title="Ambient sound">
              <option value="none" {{#if (eq data.defaults.sound_ambient "none")}}selected{{/if}}>None</option>
              <option value="dungeon" {{#if (eq data.defaults.sound_ambient "dungeon")}}selected{{/if}}>Dungeon Mix</option>
              <option value="random" {{#if (eq data.defaults.sound_ambient "random")}}selected{{/if}}>Random</option>
              <option value="cave" {{#if (eq data.defaults.sound_ambient "cave")}}selected{{/if}}>Cave Drip</option>
              <option value="underwater" {{#if (eq data.defaults.sound_ambient "underwater")}}selected{{/if}}>Underwater</option>
              <option value="whispering" {{#if (eq data.defaults.sound_ambient "whispering")}}selected{{/if}}>Whispering</option>
              <option value="eerie" {{#if (eq data.defaults.sound_ambient "eerie")}}selected{{/if}}>Eerie</option>
              <option value="ominous" {{#if (eq data.defaults.sound_ambient "ominous")}}selected{{/if}}>Ominous</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Volume <span class="range-value">{{data.defaults.sound_volume}}</span></label>
            <input type="range" name="sound_volume" value="{{data.defaults.sound_volume}}" min="0" max="1" step="0.05" class="rnk-input" title="Sound volume">
          </div>
        </div>
      </div>

      <!-- ADVERSARIES -->
      <div class="rnk-section">
        <div class="rnk-section__header thin"><i class="fas fa-dragon"></i> ADVERSARIES</div>
        <div class="rnk-row">
          <div class="rnk-field compact">
            <label>Mob Type</label>
            <select name="mob_type" class="rnk-select" title="Mob type">
              <option value="none" {{#if (eq data.defaults.mob_type "none")}}selected{{/if}}>None (Disabled)</option>
              <option value="undead" {{#if (eq data.defaults.mob_type "undead")}}selected{{/if}}>Undead</option>
              <option value="auto" {{#if (eq data.defaults.mob_type "auto")}}selected{{/if}}>Auto</option>
              <option value="humanoid" {{#if (eq data.defaults.mob_type "humanoid")}}selected{{/if}}>Humanoid</option>
              <option value="beast" {{#if (eq data.defaults.mob_type "beast")}}selected{{/if}}>Beast</option>
              <option value="aberration" {{#if (eq data.defaults.mob_type "aberration")}}selected{{/if}}>Aberration</option>
              <option value="fiend" {{#if (eq data.defaults.mob_type "fiend")}}selected{{/if}}>Fiend</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Density</label>
            <select name="mob_density" class="rnk-select" title="Mob density">
              <option value="none" {{#if (eq data.defaults.mob_density "none")}}selected{{/if}}>None (Disabled)</option>
              <option value="sparse" {{#if (eq data.defaults.mob_density "sparse")}}selected{{/if}}>Sparse</option>
              <option value="normal" {{#if (eq data.defaults.mob_density "normal")}}selected{{/if}}>Normal</option>
              <option value="dense" {{#if (eq data.defaults.mob_density "dense")}}selected{{/if}}>Dense</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Challenge</label>
            <select name="mob_challenge" class="rnk-select" title="Mob challenge rating">
              <option value="1">CR 1-2</option>
              <option value="3" selected>CR 3-5</option>
              <option value="6">CR 6-8</option>
              <option value="9">CR 9-12</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Patrols <span class="range-value">{{data.defaults.patrol_count}}</span></label>
            <input type="range" name="patrol_count" value="{{data.defaults.patrol_count}}" min="0" max="20" class="rnk-input" title="Patrol count">
          </div>
          <div class="rnk-field compact">
            <label>Mob Count <small>(0=auto)</small></label>
            <input type="number" name="mob_count" value="{{data.defaults.mob_count}}" min="0" max="200" class="rnk-input" title="Mob count">
          </div>
        </div>
      </div>

      <!-- LOOT & HAZARDS -->
      <div class="rnk-section">
        <div class="rnk-section__header thin"><i class="fas fa-cloud-rain"></i> LOOT & HAZARDS</div>
        <div class="rnk-row">
          <div class="rnk-field compact">
            <label>Hzrd Type</label>
            <select name="environmental_hazard" class="rnk-select" title="Environmental hazard">
              <option value="none" selected>None</option>
              <option value="flooding">Flooding</option>
              <option value="lava">Lava Flows</option>
              <option value="earthquake">Earthquake</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Loot Rarity</label>
            <select name="mob_loot_rarity" class="rnk-select" title="Mob loot rarity">
              <option value="none">None</option>
              <option value="common" selected>Common</option>
              <option value="uncommon">Uncommon</option>
              <option value="rare">Rare</option>
            </select>
          </div>
          <div class="rnk-field compact">
            <label>Equipment</label>
            <select name="equipment_quality" class="rnk-select" title="Equipment quality">
              <option value="common" selected>Common</option>
              <option value="uncommon">Uncommon</option>
              <option value="rare">Rare</option>
            </select>
          </div>
        </div>
      </div>

      <!-- AUTOMATION & LOGIC -->
      <div class="rnk-section">
        <div class="rnk-section__header thin"><i class="fas fa-microchip"></i> AUTOMATION & LOGIC</div>
        <div class="rnk-row toggles">
          <label class="rnk-toggle compact">
            <input type="checkbox" name="create_walls" {{#if data.defaults.create_walls}}checked{{/if}}><span class="toggle-switch"></span><span>Walls</span>
          </label>
          <label class="rnk-toggle compact">
            <input type="checkbox" name="create_doors" {{#if data.defaults.create_doors}}checked{{/if}}><span class="toggle-switch"></span><span>Doors</span>
          </label>
          <label class="rnk-toggle compact">
            <input type="checkbox" name="create_lights" {{#if data.defaults.create_lights}}checked{{/if}}><span class="toggle-switch"></span><span>Lights</span>
          </label>
          <label class="rnk-toggle compact">
            <input type="checkbox" name="create_sounds" {{#if data.defaults.create_sounds}}checked{{/if}}><span class="toggle-switch"></span><span>Sounds</span>
          </label>
          <label class="rnk-toggle compact">
            <input type="checkbox" name="spawn_mobs" {{#if data.defaults.spawn_mobs}}checked{{/if}}><span class="toggle-switch"></span><span>Mobs</span>
          </label>
          <label class="rnk-toggle compact">
            <input type="checkbox" name="spawn_boss" {{#if data.defaults.spawn_boss}}checked{{/if}}><span class="toggle-switch"></span><span>Boss</span>
          </label>
          <label class="rnk-toggle compact">
            <input type="checkbox" name="spawn_miniboss" {{#if data.defaults.spawn_miniboss}}checked{{/if}}><span class="toggle-switch"></span><span>Miniboss</span>
          </label>
        </div>
        <div class="rnk-row toggles">
          <label class="rnk-toggle compact">
            <input type="checkbox" name="enable_movement" {{#if data.defaults.enable_movement}}checked{{/if}}><span class="toggle-switch"></span><span>Move</span>
          </label>
          <label class="rnk-toggle compact">
            <input type="checkbox" name="pause_on_combat" {{#if data.defaults.pause_on_combat}}checked{{/if}}><span class="toggle-switch"></span><span>PauseCombat</span>
          </label>
          <label class="rnk-toggle compact">
            <input type="checkbox" name="respect_walls" {{#if data.defaults.respect_walls}}checked{{/if}}><span class="toggle-switch"></span><span>RespWalls</span>
          </label>
          <label class="rnk-toggle compact">
            <input type="checkbox" name="avoid_players" {{#if data.defaults.avoid_players}}checked{{/if}}><span class="toggle-switch"></span><span>AvoidPCs</span>
          </label>
          <label class="rnk-toggle compact">
            <input type="checkbox" name="generate_waypoints" {{#if data.defaults.generate_waypoints}}checked{{/if}}><span class="toggle-switch"></span><span>Waypoints</span>
          </label>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="rnk-row actions">
        <button type="submit" class="rnk-btn primary" data-action="generate-map">
          <i class="fas fa-magic"></i> Generate
        </button>
        <button type="button" class="rnk-btn secondary" data-action="open-campaign">
          <i class="fas fa-book-open"></i> Campaign
        </button>
        <button type="button" class="rnk-btn secondary" data-action="create-scene">
          <i class="fas fa-plus"></i> Create
        </button>
      </div>

      <!-- EXPORTS -->
      <div class="rnk-row exports">
        <button type="button" class="rnk-btn-icon" data-action="export-png" title="Export PNG"><i class="fas fa-image"></i> PNG</button>
        <button type="button" class="rnk-btn-icon" data-action="export-svg" title="Export SVG"><i class="fas fa-draw-polygon"></i> SVG</button>
        <button type="button" class="rnk-btn-icon" data-action="export-json" title="Export JSON"><i class="fas fa-file-code"></i> JSON</button>
      </div>

    </div><!-- end rnk-controls -->

    <!-- RIGHT: PREVIEW PANEL -->
    <div class="rnk-preview-panel">
      <div class="rnk-preview-nav">
        <button type="button" class="rnk-btn-icon" data-action="prev-level" title="Previous Level"><i class="fas fa-chevron-up"></i></button>
        <span class="rnk-level-indicator">Level <span data-bind="currentLevel">1</span> / <span data-bind="totalLevels">1</span></span>
        <button type="button" class="rnk-btn-icon" data-action="next-level" title="Next Level"><i class="fas fa-chevron-down"></i></button>
      </div>
      <div class="rnk-preview-image">
        <img data-bind="previewImage" src="" alt="Map Preview" class="rnk-map-preview">
        <div class="rnk-preview-placeholder"><i class="fas fa-map"></i><p>Generate a map to preview</p></div>
      </div>
      <div class="rnk-preview-info">
        <span data-bind="roomCount">0 rooms</span>
        <span data-bind="mapDimensions">0x0</span>
        <span data-bind="genTime">--</span>
      </div>
    </div><!-- end rnk-preview-panel -->

  </div><!-- end rnk-workspace -->
</form>
